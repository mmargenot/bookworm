name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev --group remote

      - name: Run ruff check
        run: uv run ruff check

      - name: Run ty check
        run: uv run ty check

      - name: Run tests
        run: uv run pytest tests/ -v
